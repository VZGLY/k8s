# =============================================================================
# RBAC pour le contrôleur F5 CIS
# =============================================================================
# CIS doit pouvoir LIRE l'état du cluster (services, endpoints, nodes, pods,
# secrets pour TLS, CRDs F5) et METTRE À JOUR le status des ressources qu'il
# gère (Ingress, VirtualServer...).
#
# Source officielle (à comparer si maj) :
#   https://github.com/F5Networks/k8s-bigip-ctlr/blob/master/docs/cis-installation/_rbac/clusterrole.yaml
# =============================================================================

---
# -----------------------------------------------------------------------------
# Le ServiceAccount sous lequel le pod CIS s'exécute
# -----------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bigip-ctlr
  namespace: f5-cis

---
# -----------------------------------------------------------------------------
# ClusterRole : permissions cluster-wide nécessaires à CIS
# -----------------------------------------------------------------------------
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: bigip-ctlr-clusterrole
rules:
  # Lecture des objets standard K8s que CIS observe pour construire les pools
  - apiGroups: [""]
    resources:
      - services        # cible des VirtualServers F5
      - endpoints       # pour récupérer les IPs des pods (mode cluster)
      - nodes           # pour récupérer les IPs nodes (mode nodeport)
      - namespaces
      - pods
      - secrets         # certificats TLS référencés par les Ingress/VS
      - configmaps      # config AS3 custom éventuelle
    verbs: ["get", "list", "watch"]

  # CIS publie des events (utile pour kubectl describe vs/ingress)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "update"]

  # Ingress classique K8s — si tu utilises Ingress au lieu des CRDs F5
  - apiGroups: ["networking.k8s.io", "extensions"]
    resources: ["ingresses", "ingresses/status", "ingressclasses"]
    verbs: ["get", "list", "watch", "update", "patch"]

  # Routes OpenShift — laissé pour compat, inutile en Kind pur
  - apiGroups: ["route.openshift.io"]
    resources: ["routes", "routes/status"]
    verbs: ["get", "list", "watch", "update", "patch"]

  # CRDs F5 — le vrai cœur du mode "custom resource"
  - apiGroups: ["cis.f5.com"]
    resources:
      - virtualservers
      - virtualservers/status
      - tlsprofiles
      - transportservers
      - transportservers/status
      - externaldnses
      - policies
      - ipams
      - ipams/status
    verbs: ["get", "list", "watch", "update", "patch", "create", "delete"]

  # Lecture des CRDs elles-mêmes (validation des schemas au démarrage)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]

---
# -----------------------------------------------------------------------------
# ClusterRoleBinding : lie le SA au ClusterRole
# -----------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bigip-ctlr-clusterrolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bigip-ctlr-clusterrole
subjects:
  - kind: ServiceAccount
    name: bigip-ctlr
    namespace: f5-cis
