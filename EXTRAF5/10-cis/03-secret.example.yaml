# =============================================================================
# Secret avec les credentials BIG-IP
# =============================================================================
# Le pod CIS lit USERNAME et PASSWORD depuis ce Secret pour s'authentifier
# auprès de l'API iControl REST du BIG-IP.
#
# ATTENTION : ce fichier contient des PLACEHOLDERS. NE PAS COMMIT tel quel
# avec de vrais mots de passe. En prod : utilise sealed-secrets, ESO ou Vault.
#
# Pour appliquer en local (depuis un terminal WSL) :
#   kubectl create secret generic bigip-login \
#     --namespace f5-cis \
#     --from-literal=username='admin' \
#     --from-literal=password='TON_MOT_DE_PASSE_BIGIP'
#
# OU appliquer ce YAML après avoir remplacé les valeurs base64 ci-dessous :
#   echo -n 'admin' | base64
#   echo -n 'monpass' | base64
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: bigip-login
  namespace: f5-cis
type: Opaque
data:
  # "admin" en base64 — à remplacer par ton vrai user BIG-IP
  username: YWRtaW4=
  # "REPLACE_ME" en base64 — à remplacer impérativement
  password: UkVQTEFDRV9NRQ==
