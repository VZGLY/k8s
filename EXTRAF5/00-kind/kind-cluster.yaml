# =============================================================================
# Cluster Kind 3 nœuds — RÉFÉRENCE
# =============================================================================
# Ton cluster existe déjà (1 cp + 2 workers). Ce fichier est là pour montrer
# à quoi devrait ressembler la config SI on voulait qu'un BIG-IP externe
# puisse joindre les NodePorts depuis l'hôte WSL.
#
# Pour appliquer (recrée le cluster) :
#   kind delete cluster --name f5-lab
#   kind create cluster --name f5-lab --config kind-cluster.yaml
# =============================================================================
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: f5-lab

# Pas de plugin réseau spécifique : on garde kindnet (CNI par défaut).
# CIS en mode nodeport n'a PAS besoin de connaître le pod-CIDR,
# donc kindnet suffit largement.
networking:
  # Plage par défaut des Services (laissée explicite pour la pédagogie)
  serviceSubnet: "10.96.0.0/16"
  podSubnet: "10.244.0.0/16"
  # apiServerAddress par défaut = 127.0.0.1 — OK pour un labo local
  apiServerAddress: "127.0.0.1"

nodes:
  # ---------------------------------------------------------------------------
  # Control plane
  # ---------------------------------------------------------------------------
  - role: control-plane
    # extraPortMappings ici servirait UNIQUEMENT si on voulait exposer
    # un NodePort spécifique sur l'IP de l'hôte WSL (utile si un vrai
    # BIG-IP devait taper dessus depuis l'extérieur).
    # Exemple : décommenter pour exposer le NodePort 30080 sur localhost:30080
    # extraPortMappings:
    #   - containerPort: 30080
    #     hostPort: 30080
    #     protocol: TCP

  # ---------------------------------------------------------------------------
  # Workers — les nœuds qui hébergeront les pods nginx + CIS
  # ---------------------------------------------------------------------------
  - role: worker
    # labels custom pour cibler des workloads si besoin
    labels:
      f5-lab/role: app
  - role: worker
    labels:
      f5-lab/role: app
