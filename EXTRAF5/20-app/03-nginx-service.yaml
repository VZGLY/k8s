# =============================================================================
# Service nginx — exposé en NodePort
# =============================================================================
# En mode pool_member_type=nodeport, CIS pousse vers le BIG-IP des pool members
# au format <IP_node>:<nodePort>. Donc le Service DOIT être de type NodePort
# (ou LoadBalancer, mais pas ClusterIP).
#
# Si on était en mode "cluster" (BIG-IP route le pod-CIDR), un ClusterIP
# suffirait — mais nécessite plus de plomberie réseau.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: nginx-svc
  namespace: demo
  labels:
    app: nginx
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - name: http
      port: 80          # port du Service (vu en interne K8s)
      targetPort: 80    # port du container
      protocol: TCP
      # On laisse K8s allouer dynamiquement le NodePort (30000-32767).
      # Pour fixer : nodePort: 30080
      # nodePort: 30080
