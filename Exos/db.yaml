# kubectl create secret generic mssql-secrets --from-literal=pwd=Test123=

apiVersion: v1
kind: Namespace
metadata:
  name: db

---

apiVersion: v1
kind: Pod
metadata:
  name: exo-db
  namespace: db
  labels:
    env: dev
    app: db
spec:
  containers: 
    - name: mssql-container
      image: mcr.microsoft.com/mssql/server:2025-latest
      ports:
         - containerPort: 1433
      env:
        - name: ACCEPT_EULA
          value: "Y"
        - name: MSSQL_SA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mssql-secrets
              key: pwd


